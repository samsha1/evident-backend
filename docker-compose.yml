services:
  # ── Reverse Proxy + TLS ──
  caddy:
    image: caddy:2-alpine
    container_name: evident_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy

  # ── FastAPI Application ──
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: evident_api
    restart: unless-stopped
    command: >
      uvicorn apps.api.src.main:app
      --host 0.0.0.0 --port 8000
      --reload
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://evident:evident_password@postgres:5432/evident_db
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - .:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── PostgreSQL ──
  postgres:
    image: postgres:15-alpine
    container_name: evident_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: evident
      POSTGRES_PASSWORD: evident_password
      POSTGRES_DB: evident_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evident -d evident_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: evident_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
